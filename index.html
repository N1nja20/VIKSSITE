<!DOCTYPE html>
<html>
<head>
    <title>Initializing...</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #0f0f0f, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            color: #00f7ff;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease forwards;
            max-width: 95%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* ensures horizontal center */
        }

        h1 {
            font-size: clamp(25px, 6vw, 50px);
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00f7ff;
            line-height: 1.2;
            margin: 0;
        }

        p {
            margin-top: 20px;
            font-size: clamp(14px, 3.5vw, 18px);
            opacity: 0.7;
        }

        .btn {
            margin-top: 40px;
            padding: 12px 30px;
            font-size: clamp(14px, 3vw, 16px);
            background: transparent;
            border: 2px solid #00f7ff;
            color: #00f7ff;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #00f7ff;
            color: black;
            box-shadow: 0 0 20px #00f7ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* GLITCH EFFECT */
        .glitch {
            position: relative;
            font-size: clamp(25px, 6vw, 50px);
            font-family: 'Orbitron', sans-serif;
            color: #ff0055;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
            white-space: nowrap;
            display: block; /* changed from inline-block */
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            width: 100%;
            clip-path: inset(0 0 0 0);
            opacity: 0.8;
        }

        .glitch::before {
            left: 2px;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
            animation: glitchTop 1.5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            color: #ff00ff;
            text-shadow: 0 0 8px #ff00ff;
            animation: glitchBottom 1.5s infinite linear alternate-reverse;
        }

        @keyframes glitchTop {
            0%   { transform: translate(0px, 0px); clip-path: inset(0 0 80% 0); }
            20%  { transform: translate(-2px, 1px); clip-path: inset(10% 0 60% 0); }
            40%  { transform: translate(2px, -1px); clip-path: inset(40% 0 30% 0); }
            60%  { transform: translate(-1px, 2px); clip-path: inset(20% 0 50% 0); }
            80%  { transform: translate(1px, -2px); clip-path: inset(60% 0 10% 0); }
            100% { transform: translate(0px, 0px); clip-path: inset(0 0 80% 0); }
        }

        @keyframes glitchBottom {
            0%   { transform: translate(0px, 0px); clip-path: inset(80% 0 0 0); }
            20%  { transform: translate(2px, -1px); clip-path: inset(60% 0 10% 0); }
            40%  { transform: translate(-2px, 1px); clip-path: inset(30% 0 40% 0); }
            60%  { transform: translate(1px, -2px); clip-path: inset(50% 0 20% 0); }
            80%  { transform: translate(-1px, 2px); clip-path: inset(10% 0 60% 0); }
            100% { transform: translate(0px, 0px); clip-path: inset(80% 0 0 0); }
        }

        /* SMALL SCREEN ADJUSTMENTS */
        @media (max-width: 500px) {
            .glitch {
                font-size: clamp(18px, 8vw, 28px);
                letter-spacing: 1px;
            }

            .glitch::before {
                left: 1px;
            }
            .glitch::after {
                left: -1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch" data-text="ACCESSING VIKS PROFILE">
            ACCESSING VIKS PROFILE
        </h1>

        <p>Authenticating Gamer Identity...</p>

        <button class="btn" onclick="enterSite()">ENTER</button>
    </div>

    <script>
        function enterSite() {
            window.location.href = "profile.html";
        }
    </script>

</body>
</html>
