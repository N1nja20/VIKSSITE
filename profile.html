        * {

            padding: 0;

        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #000000);
            font-family: 'Orbitron', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated background particles */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #00f7ff33 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 20s linear infinite;
        }

        @keyframes moveBg {
            from { transform: translate(0,0); }
            to { transform: translate(-200px,-200px); }
        }

        .card {
            position: relative;
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 380px;
            box-shadow: 0 0 40px #00f7ff44;
            backdrop-filter: blur(10px);
        }

        .pfp {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #00f7ff;
            box-shadow: 0 0 25px #00f7ff;
            object-fit: cover;
        }

        h1 {
            margin-top: 20px;
            font-size: 28px;
            color: #00f7ff;
            text-shadow: 0 0 20px #00f7ff;
        }

        .tag {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 25px;
        }

        .socials a {
            display: block;
            margin: 10px 0;
            padding: 12px;
            text-decoration: none;
            color: #00f7ff;
            border: 2px solid #00f7ff;
            border-radius: 8px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .socials a:hover {
            background: #00f7ff;
            color: black;
            box-shadow: 0 0 20px #00f7ff;
        }

        .stats {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.8;
        }

        .stats p {
            margin: 5px 0;
        }

    </style>
